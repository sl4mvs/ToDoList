<div class="todo-card">
  <div class="todo-left">
    <input
      type="checkbox"
      [checked]="todo.isCompleted"
      (change)="onToggle()" />
  </div>

  <div class="todo-content">
    <div class="todo-title" [class.completed]="todo.isCompleted">
      {{ todo.title }}
    </div>

    <div class="todo-status">
      {{ todo.isCompleted ? 'Завершена' : 'Активна' }}
    </div>
  </div>

  <button class="delete-btn" (click)="onDelete()">✕</button>
</div>
